<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigation System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-compass"></i>
                    <span id="siteTitle">Navigation</span>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Banner Slider -->
        <section class="banner-section">
            <div class="banner-slider" id="bannerSlider">
                <div class="banner-container" id="bannerContainer">
                    <!-- Banners loaded dynamically -->
                </div>
                <div class="banner-dots" id="bannerDots"></div>
            </div>
        </section>

        <!-- News Ticker -->
        <section class="news-section">
            <div class="news-header">
                <i class="fas fa-bullhorn"></i>
                <span>ประกาศข่าวสาร</span>
            </div>
            <div class="news-ticker" id="newsTicker">
                <!-- News loaded dynamically -->
            </div>
        </section>

        <!-- Department Filter -->
        <section class="filter-section">
            <div class="filter-scroll" id="deptFilter">
                <button class="filter-btn active" data-dept="all">ทั้งหมด</button>
                <!-- Departments loaded dynamically -->
            </div>
        </section>

        <!-- Grid Menu -->
        <section class="menu-section">
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items loaded dynamically -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Navigation System. All rights reserved.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
