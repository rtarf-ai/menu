<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyMDU.25 :: แอปพลิเคชัน นพค.25</title>
    
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyMDU.25">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ป้องกันการไฮไลท์ข้อความและการซูมที่ไม่ตั้งใจบนมือถือ */
        body {
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: { 
                        primary: '#1e3a8a',    /* Deep Navy */
                        secondary: '#3b82f6',  /* Blue */
                        accent: '#fbbf24',     /* Premium Gold/Amber */
                        surface: '#f8fafc'     /* Slate 50 */
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-slate-800 antialiased selection:bg-primary selection:text-white overflow-x-hidden pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">

    <div id="app" class="max-w-md md:max-w-4xl mx-auto min-h-[100dvh] relative pb-20 shadow-xl bg-white">
        
        <div id="loading" class="absolute inset-0 z-[60] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="relative flex flex-col items-center">
                <div class="w-20 h-20 rounded-full border-4 border-slate-100 absolute"></div>
                <div class="w-20 h-20 rounded-full border-4 border-primary border-t-accent animate-spin mb-6"></div>
                <i class="fas fa-shield-halved absolute top-[1.1rem] text-3xl text-primary drop-shadow-sm"></i>
                
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight mt-6">MyMDU<span class="text-primary">.25</span></h1>
                <p class="text-slate-500 font-medium text-sm mt-2 animate-pulse">กำลังเตรียมระบบปฏิบัติการ...</p>
            </div>
        </div>
        
        </div>

    <div id="news-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[70] flex items-center justify-center hidden opacity-0 transition-all duration-300 p-4">
        <div class="bg-white/95 backdrop-blur-xl p-7 rounded-[1.5rem] shadow-glass w-full max-w-sm md:max-w-md transform scale-95 transition-transform duration-300" id="news-modal-content">
            <div class="flex items-center gap-4 mb-5">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-50 to-blue-100 text-primary rounded-2xl flex items-center justify-center shrink-0 shadow-sm border border-white">
                    <i class="fas fa-bell text-xl"></i>
                </div>
                <div>
                    <span class="bg-accent/20 text-yellow-700 text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wide">ประกาศสำคัญ</span>
                    <p id="modal-date" class="text-xs text-slate-400 font-medium mt-1"></p>
                </div>
            </div>
            <h2 id="modal-title" class="text-xl font-bold text-slate-800 mb-3 leading-snug"></h2>
            <div id="modal-body" class="text-slate-600 mb-6 text-sm leading-relaxed max-h-[45vh] overflow-y-auto no-scrollbar whitespace-pre-line"></div>
            
            <button onclick="App.closeNewsModal()" class="w-full bg-slate-100/80 text-slate-700 font-bold py-3.5 rounded-xl hover:bg-slate-200 active:scale-[0.98] transition-all focus:outline-none border border-slate-200">
                รับทราบ
            </button>
        </div>
    </div>

    <div id="in-app-viewer" class="fixed inset-0 z-[100] bg-surface hidden flex-col transition-transform translate-x-full duration-300 ease-out">
        <div class="bg-gradient-to-r from-primary to-blue-900 text-white h-14 flex items-center px-2 shadow-md shrink-0 pt-[env(safe-area-inset-top)] box-content">
            <button onclick="App.closeInApp()" class="w-12 h-12 flex items-center justify-center rounded-full active:bg-white/20 transition-colors focus:outline-none">
                <i class="fas fa-chevron-left text-lg"></i>
            </button>
            <h2 id="viewer-title" class="font-semibold ml-1 truncate flex-1 text-base">กำลังโหลด...</h2>
            <div class="w-12"></div> </div>
        <iframe id="viewer-frame" class="w-full flex-1 border-0 bg-white"></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="app.js?v=4"></script>
</body>
</html>
