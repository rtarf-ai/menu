<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium App Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; margin: 0; padding: 0; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh; background-color: #1e293b; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .menu-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .menu-btn:active { transform: scale(0.95); }
        .swiper-pagination-bullet { background: #fff; opacity: 0.3; }
        .swiper-pagination-bullet-active { background: #3b82f6; opacity: 1; }
        
        /* Loading Screen */
        #loader { position: absolute; inset: 0; background: #1e293b; z-index: 100; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body class="text-white">

    <div class="app-container flex flex-col">
        <div id="loader">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x text-blue-500"></i>
        </div>

        <div class="w-full h-1/3 relative">
            <div class="swiper bannerSwiper h-full w-full">
                <div class="swiper-wrapper" id="banner-container">
                    </div>
                <div class="swiper-pagination banner-pagination"></div>
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#1e293b] to-transparent z-10 pointer-events-none"></div>
        </div>

        <div class="w-full flex-grow p-4 relative z-20 -mt-6">
            <div class="swiper menuSwiper h-full">
                <div class="swiper-wrapper" id="menu-container">
                    </div>
                <div class="swiper-pagination menu-pagination absolute bottom-0 mb-2"></div>
            </div>
        </div>

        <div class="w-full h-16 bg-slate-800 flex justify-around items-center border-t border-slate-700 pb-safe z-30">
            <button onclick="toggleModal('user-modal', false)" class="flex flex-col items-center text-blue-400 w-1/2">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-xs mt-1">หน้าแรก</span>
            </button>
            <button onclick="toggleModal('user-modal', true)" class="flex flex-col items-center text-slate-400 hover:text-white w-1/2 transition-colors">
                <i class="fa-solid fa-user text-xl"></i>
                <span class="text-xs mt-1">โปรไฟล์</span>
            </button>
        </div>

        <div id="user-modal" class="absolute inset-0 bg-[#0f172a] z-50 transition-transform translate-y-full flex flex-col duration-300">
            <div class="flex-grow overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="modal-title" class="text-2xl font-bold">จัดการบัญชี</h2>
                    <button onclick="toggleModal('user-modal', false)" class="text-gray-400 hover:text-white p-2">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <div id="login-form" class="space-y-4">
                    <div class="text-center mb-8">
                        <div class="w-20 h-20 bg-slate-800 rounded-full mx-auto flex items-center justify-center mb-4 border border-slate-700">
                            <i class="fa-solid fa-user-lock text-3xl text-gray-400"></i>
                        </div>
                        <p class="text-gray-400 text-sm">กรุณาเข้าสู่ระบบเพื่อจัดการข้อมูลของคุณ</p>
                    </div>
                    <input type="text" id="login-user" placeholder="ชื่อผู้ใช้งาน (Username)" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-white">
                    <input type="password" id="login-pass" placeholder="รหัสผ่าน (Password)" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-white">
                    <button onclick="login()" class="w-full p-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/50 mt-2">เข้าสู่ระบบ</button>
                </div>

                <div id="user-content" class="hidden space-y-6">
                    <div class="flex items-center space-x-4 p-4 bg-slate-800 border border-slate-700 rounded-2xl">
                        <img id="user-avatar" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 object-cover bg-slate-900">
                        <div>
                            <h3 id="user-display-name" class="font-bold text-xl">---</h3>
                            <span id="user-role-badge" class="px-2 py-1 bg-blue-900/50 text-blue-400 rounded text-xs uppercase tracking-wider font-bold">User</span>
                        </div>
                    </div>

                    <div class="space-y-2 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                        <h4 class="text-sm font-semibold text-gray-300 mb-2">ข้อมูลส่วนตัว</h4>
                        <label class="text-xs text-gray-500">ชื่อที่แสดง</label>
                        <input type="text" id="edit-name" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-white outline-none focus:border-blue-500 mb-3">
                        <button onclick="saveProfile()" class="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors">บันทึกข้อมูลส่วนตัว</button>
                    </div>

                    <div id="admin-only-section" class="hidden pt-4">
                        <h4 class="text-sm font-bold text-emerald-400 mb-3 uppercase flex items-center"><i class="fa-solid fa-shield-halved mr-2"></i> ส่วนจัดการแอดมิน</h4>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="alert('ไปหน้าตั้งค่า Sheet: Banners')" class="p-4 bg-slate-800 rounded-xl text-left border border-slate-700 hover:border-emerald-500 transition-all group">
                                <i class="fa-solid fa-images mb-2 text-emerald-400 group-hover:scale-110 transition-transform"></i>
                                <p class="text-sm font-medium">จัดการแบนเนอร์</p>
                            </button>
                            <button onclick="alert('ไปหน้าตั้งค่า Sheet: Menus')" class="p-4 bg-slate-800 rounded-xl text-left border border-slate-700 hover:border-emerald-500 transition-all group">
                                <i class="fa-solid fa-list-check mb-2 text-emerald-400 group-hover:scale-110 transition-transform"></i>
                                <p class="text-sm font-medium">จัดการเมนูระบบ</p>
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-2 text-center">* จัดการข้อมูลโดยตรงผ่าน Google Sheets</p>
                    </div>

                    <button onclick="logout()" class="w-full p-4 border border-red-500/30 text-red-400 hover:bg-red-500/10 rounded-xl font-medium mt-8 transition-colors">
                        <i class="fa-solid fa-right-from-bracket mr-2"></i> ออกจากระบบ
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    
    <script>
        // *** วาง URL ของ Google Apps Script ของคุณที่นี่ ***
        const API_URL = 'YOUR_GAS_WEB_APP_URL_HERE'; 
        
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchAppData();
        });

        // ==========================================
        // 1. ระบบดึงข้อมูลและแสดงผล (Render)
        // ==========================================
        async function fetchAppData() {
            try {
                if(API_URL === 'https://script.google.com/macros/s/AKfycbxy4usGWe1RKdo7lzrcQty_aqGqfhvsmOD_IpH91rjatluKtECz7kEW9oW09qdokkc/exec') {
                    console.log("แสดงข้อมูลตัวอย่าง (Mock Data) เนื่องจากยังไม่ได้ใส่ API URL");
                    renderApp(getMockData());
                    return;
                }

                const response = await fetch(`${API_URL}?action=getData`);
                const data = await response.json();
                
                if(data.status === 'success') {
                    renderApp(data);
                } else {
                    alert('เกิดข้อผิดพลาดในการโหลดข้อมูลจากฐานข้อมูล');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
                // แสดงข้อมูลจำลองให้เห็นหน้าตาก่อนหากโหลดไม่ขึ้น
                renderApp(getMockData()); 
            }
        }

        function renderApp(data) {
            renderBanners(data.banners);
            renderMenus(data.menus);
            
            // ปิดหน้าจอโหลด
            document.getElementById('loader').style.display = 'none';

            // เริ่มทำงาน Swiper แบนเนอร์
            new Swiper(".bannerSwiper", {
                loop: true,
                autoplay: { delay: 4000, disableOnInteraction: false },
                pagination: { el: ".banner-pagination", clickable: true },
            });

            // เริ่มทำงาน Swiper เมนู (กรณีเกิน 9 ไอเทม)
            new Swiper(".menuSwiper", {
                pagination: { el: ".menu-pagination", clickable: true },
            });
        }

        function renderBanners(banners) {
            const container = document.getElementById('banner-container');
            if(banners.length === 0) return; // ป้องกันกรณีไม่มีข้อมูล
            container.innerHTML = banners.map(banner => `
                <div class="swiper-slide cursor-pointer" onclick="window.open('${banner.link}', '_blank')">
                    <img src="${banner.image}" class="w-full h-full object-cover" alt="Banner">
                </div>
            `).join('');
        }

        function renderMenus(menus) {
            const container = document.getElementById('menu-container');
            let html = '';
            const chunkSize = 9; // กำหนด 9 เมนูต่อ 1 หน้า
            
            for (let i = 0; i < menus.length; i += chunkSize) {
                const chunk = menus.slice(i, i + chunkSize);
                let gridHtml = `<div class="swiper-slide"><div class="grid grid-cols-3 gap-3">`;
                
                chunk.forEach(menu => {
                    gridHtml += `
                        <a href="${menu.url}" target="_blank" class="menu-btn aspect-square rounded-2xl flex flex-col items-center justify-center text-center p-2 transition-all hover:bg-slate-700">
                            <i class="${menu.icon} text-3xl mb-2 text-gray-300"></i>
                            <span class="text-xs font-light text-gray-300 leading-tight">${menu.title}</span>
                        </a>
                    `;
                });
                
                gridHtml += `</div></div>`;
                html += gridHtml;
            }
            container.innerHTML = html;
        }

        // ==========================================
        // 2. ระบบ User / Authentication
        // ==========================================
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('translate-y-full');
            } else {
                modal.classList.add('translate-y-full');
            }
        }

        async function login() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            if(!user || !pass) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                return;
            }

            document.getElementById('loader').style.display = 'flex'; // เปิดตัวโหลด
            
            try {
                const res = await fetch(`${API_URL}?action=login&user=${user}&pass=${pass}`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    currentUser = data.user;
                    currentUser.username = user;
                    updateUIForLoggedInUser();
                } else {
                    alert('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (e) {
                console.error(e);
                alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบ');
            } finally {
                document.getElementById('loader').style.display = 'none'; // ปิดตัวโหลด
            }
        }

        function updateUIForLoggedInUser() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('user-content').classList.remove('hidden');
            
            // อัปเดตข้อมูลบนหน้าจอ
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('user-avatar').src = currentUser.profilePic || 'https://ui-avatars.com/api/?name=' + currentUser.name + '&background=0D8ABC&color=fff';
            
            const roleBadge = document.getElementById('user-role-badge');
            roleBadge.innerText = currentUser.role;
            if(currentUser.role === 'admin') {
                roleBadge.className = "px-2 py-1 bg-emerald-900/50 text-emerald-400 rounded text-xs uppercase tracking-wider font-bold";
                document.getElementById('admin-only-section').classList.remove('hidden');
            } else {
                roleBadge.className = "px-2 py-1 bg-blue-900/50 text-blue-400 rounded text-xs uppercase tracking-wider font-bold";
                document.getElementById('admin-only-section').classList.add('hidden');
            }

            document.getElementById('edit-name').value = currentUser.name;
        }

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            if(!newName) return;
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateProfile',
                        username: currentUser.username,
                        name: newName,
                        profilePic: currentUser.profilePic // ส่งรูปเดิมไปก่อน
                    })
                });
                
                const data = await response.json();
                if(data.status === 'success') {
                    currentUser.name = newName;
                    document.getElementById('user-display-name').innerText = newName;
                    alert('บันทึกข้อมูลเรียบร้อยแล้ว');
                } else {
                    alert('ไม่สามารถบันทึกข้อมูลได้');
                }
            } catch (e) {
                console.error(e);
                alert('การส่งข้อมูลล้มเหลว');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('user-content').classList.add('hidden');
            toggleModal('user-modal', false);
        }

        // ==========================================
        // ข้อมูลจำลอง (Mock Data) สำหรับเทส UI ตอนยังไม่ต่อ API
        // ==========================================
        function getMockData() {
            return {
                banners: [
                    { image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80", link: "#" },
                    { image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=800&q=80", link: "#" }
                ],
                menus: Array.from({length: 12}).map((_, i) => ({
                    title: ['ปฏิทินกิจกรรม', 'สถานที่น่าสนใจ', 'แหล่งช้อปปิ้ง', 'ร้านอาหาร', 'ที่พัก', 'แผนการเที่ยว', 'ข้อมูลส่วนตัว', 'แจ้งเตือน', 'แผนที่', 'ตั้งค่า', 'ข่าวสาร', 'ติดต่อเรา'][i],
                    icon: ['fa-regular fa-calendar', 'fa-solid fa-flag', 'fa-solid fa-bag-shopping', 'fa-solid fa-martini-glass', 'fa-solid fa-bed', 'fa-regular fa-circle-check', 'fa-solid fa-user', 'fa-regular fa-bell', 'fa-solid fa-map-location-dot', 'fa-solid fa-gear', 'fa-regular fa-newspaper', 'fa-solid fa-phone'][i],
                    url: "#"
                }))
            };
        }
    </script>
</body>
</html>
